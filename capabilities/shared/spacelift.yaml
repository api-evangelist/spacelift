naftiko: "1.0.0-alpha1"

info:
  label: Spacelift GraphQL API
  description: >-
    Spacelift's GraphQL API for programmatic control of infrastructure stacks, runs,
    policies, contexts, worker pools, modules, and blueprints. Authentication requires
    exchanging an API key ID and secret for a JWT bearer token.
  tags:
    - Infrastructure as Code
    - DevOps
    - Platform Engineering
    - Terraform
    - GraphQL
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPACELIFT_API_KEY_ID: SPACELIFT_API_KEY_ID
      SPACELIFT_API_KEY_SECRET: SPACELIFT_API_KEY_SECRET
      SPACELIFT_ACCOUNT: SPACELIFT_ACCOUNT

capability:
  consumes:
    - type: http
      namespace: spacelift
      baseUri: https://{{env.SPACELIFT_ACCOUNT}}.app.spacelift.io
      description: Spacelift GraphQL API
      authentication:
        type: bearer
        token: "{{SPACELIFT_JWT}}"
      resources:
        - name: graphql
          path: /graphql
          description: Spacelift GraphQL endpoint — POST queries and mutations
          operations:
            - name: list-stacks
              method: POST
              description: Query all stacks in the account with their state and configuration
              body:
                type: json
                data:
                  query: "{ stacks { id name description createdAt labels repository branch state space driftDetection autoApply } }"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.data.stacks"
            - name: create-stack
              method: POST
              description: Create a new infrastructure stack
              body:
                type: json
                data:
                  query: "mutation($input: StackInput!) { stackCreate(input: $input) { id name } }"
                  variables:
                    input: "{{tools.input}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.data.stackCreate"
            - name: create-run
              method: POST
              description: Trigger a new run on an existing stack
              body:
                type: json
                data:
                  query: "mutation($stack: ID!, $message: String) { runCreate(stack: $stack, message: $message) { id state } }"
                  variables:
                    stack: "{{tools.stack}}"
                    message: "{{tools.message}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.data.runCreate"
            - name: list-policies
              method: POST
              description: Query all policies defined in the account
              body:
                type: json
                data:
                  query: "{ policies { id name type body labels } }"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.data.policies"
            - name: list-contexts
              method: POST
              description: Query all contexts (shared environment variables and files)
              body:
                type: json
                data:
                  query: "{ contexts { id name description labels } }"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.data.contexts"
            - name: list-worker-pools
              method: POST
              description: Query all worker pools in the account
              body:
                type: json
                data:
                  query: "{ workerPools { id name description labels workers { busy } } }"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.data.workerPools"

  exposes:
    - type: rest
      port: 8100
      namespace: spacelift-rest
      resources:
        - path: /v1/stacks
          name: stacks
          description: Infrastructure stacks
          operations:
            - method: GET
              name: list-stacks
              description: List all infrastructure stacks
              call: "spacelift.list-stacks"
              outputParameters:
                - type: object
                  mapping: "$.data.stacks"
        - path: /v1/policies
          name: policies
          description: Governance policies
          operations:
            - method: GET
              name: list-policies
              description: List all policies
              call: "spacelift.list-policies"
              outputParameters:
                - type: object
                  mapping: "$.data.policies"

    - type: mcp
      port: 9100
      namespace: spacelift-mcp
      transport: http
      tools:
        - name: list-stacks
          description: List all Spacelift infrastructure stacks with their state, repository, and configuration
          hints:
            readOnly: true
          call: "spacelift.list-stacks"
          outputParameters:
            - type: object
              mapping: "$.data.stacks"
        - name: create-run
          description: Trigger a new infrastructure run on a Spacelift stack
          hints:
            readOnly: false
          call: "spacelift.create-run"
          with:
            stack: "tools.stack"
            message: "tools.message"
          outputParameters:
            - type: object
              mapping: "$.data.runCreate"
        - name: list-policies
          description: List all Spacelift governance policies (OPA/Rego)
          hints:
            readOnly: true
          call: "spacelift.list-policies"
          outputParameters:
            - type: object
              mapping: "$.data.policies"
        - name: list-worker-pools
          description: List all Spacelift worker pools and their worker status
          hints:
            readOnly: true
          call: "spacelift.list-worker-pools"
          outputParameters:
            - type: object
              mapping: "$.data.workerPools"
